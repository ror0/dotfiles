[cursor.style]
blinking = "on"
shape = "Block"

[env]
TERM = "alacritty"

[font]
builtin_box_drawing = false
size = 12

[font.bold]
#family = "Sauce Code Pro Nerd Font"
family = "JetBrainsMono Nerd Font"
style = "Bold"

[font.bold_italic]
#family = "Sauce Code Pro Nerd Font"
family = "JetBrainsMono Nerd Font"
style = "Bold Italic"

[font.italic]
#family = "Sauce Code Pro Nerd Font"
family = "JetBrainsMono Nerd Font"
style = "Italic"

[font.normal]
#family = "Sauce Code Pro Nerd Font"
family = "JetBrainsMono Nerd Font"
style = "Regular"

[scrolling]
history = 10000

[terminal.shell]
program = "/usr/bin/zsh"

[window]
dynamic_title = true
position = "None"
title = "Alacritty"
padding = { x = 20, y = 20 }

[terminal]

