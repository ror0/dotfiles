[bar/top]

width = 100%
height = 35

background = #181818
foreground = #ffffff

padding-left = 2
padding-right = 2
module-margin-left = 1
module-margin-right = 1
spacing = 1

font-0 = Source Code Pro:style=Regular:size=10;2
font-1 = Material Design Icons:style=Regular:size=11;3
#font-0 = Sauce Code Pro Nerd Font Mono:style=Regular:size=11;3


modules-left = shutdown
modules-center = i3
modules-right = network alsa battery date

override-redirect = true
wm-name = i3
wm-restack = i3

[module/date]
type = internal/date

date = %l:%M %P
date-alt = %x

[module/i3]
type = internal/i3

format = <label-state>

label-focused = " %{T2}ůįĚ•%{T-} "
label-focused-foreground = #ffffff 

label-unfocused = " %{T2}ůįĚ•%{T-} "
label-unfocused-foreground = #404040

label-visible = " %{T2}ůįĚ•%{T-} "
label-visible-foreground = #404040

label-empty = " %{T2}ůįĚ¶%{T-} "
label-empty-foreground = #404040

label-urgent = " %{T2}ůįĚ•%{T-} "
label-urgent-foreground = #e84f4f

[module/bspwm]
type = internal/bspwm

format = <label-state>

label-focused = " %{T2}ůįĚ•%{T-} "
label-focused-foreground = #ffffff 

label-occupied = " %{T2}ůįĚ•%{T-} "
label-occupied-foreground = #404040

label-empty = " %{T2}ůįĚ¶%{T-} "
label-empty-foreground = #404040

label-urgent = " %{T2}ůįĚ•%{T-} "
label-urgent-foreground = #e84f4f

[module/battery]
type = internal/battery

battery = BAT0
adapter = AC

format-charging = <label-charging>

format-discharging = <ramp-capacity>

label-full = ůįĀĻ

label-discharging = %percentage:3%%

ramp-capacity-0 = ůįĀļ
ramp-capacity-1 = ůįĀĽ
ramp-capacity-2 = ůįĀľ
ramp-capacity-3 = ůįĀĹ
ramp-capacity-4 = ůįĀĺ
ramp-capacity-5 = ůįĀŅ
ramp-capacity-6 = ůįāÄ
ramp-capacity-7 = ůįāĀ
ramp-capacity-8 = ůįāā

label-charging = ůįāĄ

[module/alsa]
type = internal/alsa

master-mixer = Master

format-volume = <ramp-volume>

format-muted = ůįĖĀ

label-muted = %percentage:3%

label-volume = %percentage:3%

ramp-volume-0 = ůįēŅ
ramp-volume-1 = ůįĖÄ
ramp-volume-2 = ůįēĺ

[module/network]
type = internal/network
interface = wlp2s0

format-connected = <ramp-signal>

format-disconnected = <label-disconnected>

label-disconnected = ůį§ģ

ramp-signal-0 = ůį§Į
ramp-signal-1 = ůį§ü
ramp-signal-2 = ůį§Ę
ramp-signal-3 = ůį§•
ramp-signal-4 = ůį§®

[module/shutdown]
type = custom/menu

label-open = ůįź•
label-close = ůįÖĖ

label-separator = "  "

menu-0-0 = Lock
menu-0-0-exec = lock.sh
menu-0-1 = Logoff
menu-0-1-exec = i3-msg exit
menu-0-2 = Reboot
menu-0-2-exec = sudo reboot
menu-0-3 = Shutdown
menu-0-3-exec = sudo poweroff

